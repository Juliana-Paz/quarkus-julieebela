# configuracao do bd
quarkus.datasource.db-kind = postgresql
quarkus.datasource.username = topicos2
quarkus.datasource.password = 123456
quarkus.datasource.jdbc.url = jdbc:postgresql://localhost:5432/topicos2db

quarkus.hibernate-orm.database.generation=drop-and-create

# desabilitar o docker 
quarkus.devservices.enabled=false


quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.log.bind-parameters=true

# configuracao do cors
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:4200
quarkus.http.cors.methods=GET,PUT,POST,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=accept, authorization, content-type, x-requested-with
# wildcard (*) é incompatível com allow-credentials=true — listar explicitamente
quarkus.http.cors.exposed-headers=Authorization, Content-Disposition, X-Page, X-Page-Size, X-Total-Count
quarkus.http.cors.access-control-max-age=24H
quarkus.http.cors.access-control-allow-credentials=true

# base url para o type em exception
%dev.problem.base-url=http://localhost:8080
%prod.problem.base-url=https://api.seusistema.com

# configuracao do jwt 
mp.jwt.verify.publickey.location=META-INF/resources/publicKey.pem
mp.jwt.verify.issuer=unitins-jwt
smallrye.jwt.sign.key.location=META-INF/resources/privateKey.pem

# configuracao do seaweedfs
seaweedfs.master.url=http://localhost:9333
seaweedfs.request-timeout-ms=10000

# dev service do seaweedfs (sobe container automaticamente no perfil dev)
# para desabilitar: %dev.seaweedfs.devservice.enabled=false
%dev.seaweedfs.devservice.enabled=true

# Mailer — mock=true: email nao e enviado, aparece no log do Quarkus (suficiente para TCC)
quarkus.mailer.from=julieebela.noreply@gmail.com
quarkus.mailer.host=smtp.gmail.com
quarkus.mailer.port=587
quarkus.mailer.start-tls=REQUIRED
quarkus.mailer.username=julieebela.noreply@gmail.com
quarkus.mailer.password=SENHA_DE_APP_AQUI
quarkus.mailer.mock=true

# log detalhado no perfil dev
%dev.quarkus.log.console.enable=true
%dev.quarkus.log.console.level=DEBUG
%dev.quarkus.log.category."br.unitins.tp2".level=DEBUG
%dev.quarkus.log.category."io.vertx.ext.web".level=DEBUG
%dev.quarkus.log.category."io.quarkus.vertx.http".level=DEBUG
